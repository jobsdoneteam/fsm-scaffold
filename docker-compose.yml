version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: fsm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fsm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-fsm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fsm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: fsm_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fsm}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-fsm_db}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
